<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;flex-direction:column;background:#FFFFFF;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:1px solid rgba(66,110,80,0.10);transition:transform .2s ease, box-shadow .2s ease;font-family:'Nunito',sans-serif;height:100%;" style-hover="transform:translateY(-4px);box-shadow:0 8px 32px rgba(66,110,80,0.18);">

  <div style="position:relative;aspect-ratio:1/1;background:#59614D;background-image:url('assets/topo-cream.svg');background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;">
    <div style="position:absolute;inset:0;background:linear-gradient(160deg, rgba(66,110,80,0.55), rgba(89,97,77,0.75));"></div>
    <span style="position:relative;font-family:'Courier New',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,242,215,0.85);">[ foto · {{ badge }} ]</span>
    <span style="position:absolute;top:14px;left:14px;background:{{ badgeColor }};color:#FFF2D7;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-radius:9999px;">{{ badge }}</span>
  </div>

  <div style="display:flex;flex-direction:column;gap:14px;padding:20px;flex:1;">
    <div style="display:flex;flex-direction:column;gap:4px;">
      <h3 style="margin:0;font-size:1.25rem;font-weight:700;color:#2C2C2C;line-height:1.2;">{{ title }}</h3>
      <sc-if value="{{ isFull }}" hint-placeholder-val="{{ true }}"><span style="font-size:.8rem;color:#59614D;font-weight:500;">{{ processDesc }}</span></sc-if>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      <sc-for list="{{ notes }}" as="note" hint-placeholder-count="3">
        <span style="font-size:.72rem;font-weight:600;color:#426E50;background:rgba(66,110,80,0.08);border:1px solid rgba(66,110,80,0.18);padding:4px 10px;border-radius:9999px;">{{ note }}</span>
      </sc-for>
    </div>

    <sc-if value="{{ isFull }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-direction:column;gap:8px;padding:12px 0;border-top:1px solid rgba(66,110,80,0.12);border-bottom:1px solid rgba(66,110,80,0.12);">
        <sc-for list="{{ attrs }}" as="attr" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
            <span style="font-size:.78rem;font-weight:700;color:#59614D;text-transform:uppercase;letter-spacing:.04em;">{{ attr.name }}</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:.78rem;color:#2C2C2C;font-weight:500;">{{ attr.label }}</span>
              <div style="display:flex;gap:4px;">
                <sc-for list="{{ attr.dots }}" as="dot" hint-placeholder-count="3">
                  <sc-if value="{{ dot.on }}" hint-placeholder-val="{{ true }}"><span style="width:9px;height:9px;border-radius:9999px;background:#426E50;display:block;"></span></sc-if>
                  <sc-if value="{{ dot.off }}" hint-placeholder-val="{{ false }}"><span style="width:9px;height:9px;border-radius:9999px;background:rgba(66,110,80,0.18);display:block;"></span></sc-if>
                </sc-for>
              </div>
            </div>
          </div>
        </sc-for>
      </div>

      <div style="display:flex;flex-direction:column;gap:6px;">
        <sc-for list="{{ prices }}" as="p" hint-placeholder-count="2">
          <div style="display:flex;align-items:baseline;justify-content:space-between;">
            <span style="font-size:.85rem;color:#59614D;font-weight:500;">{{ p.size }}</span>
            <span style="font-size:1.05rem;color:#426E50;font-weight:700;">{{ p.price }}</span>
          </div>
        </sc-for>
      </div>

      <a href="{{ whatsappUrl }}" target="_blank" rel="noopener" aria-label="Pedir por WhatsApp" style="margin-top:auto;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;background:#426E50;color:#FFF2D7;font-weight:700;font-size:.95rem;padding:12px 18px;border-radius:9999px;transition:background .2s ease;" style-hover="background:#59614D;">
        <span style="font-size:1.05rem;">✆</span> Pedir por WhatsApp
      </a>
    </sc-if>

    <sc-if value="{{ isCompact }}" hint-placeholder-val="{{ false }}">
      <div style="margin-top:auto;display:flex;align-items:baseline;justify-content:space-between;padding-top:12px;border-top:1px solid rgba(66,110,80,0.12);">
        <span style="font-size:.78rem;color:#59614D;font-weight:600;">{{ fromSize }}</span>
        <span style="font-size:1.15rem;color:#426E50;font-weight:700;">{{ fromPrice }}</span>
      </div>
      <a href="Catalogo.dc.html" style="text-decoration:none;color:#426E50;font-weight:700;font-size:.9rem;display:inline-flex;align-items:center;gap:6px;" style-hover="color:#981915;">Ver en catálogo →</a>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:520},&quot;name&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Suave Lavado Colombiano&quot;},&quot;badge&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Lavado&quot;},&quot;badgeColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#426E50&quot;},&quot;processDesc&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Proceso lavado completo&quot;},&quot;notes&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[&quot;Panela&quot;,&quot;Chocolate&quot;,&quot;Miel&quot;]},&quot;prices&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[{&quot;size&quot;:&quot;250 gr&quot;,&quot;price&quot;:&quot;$30.300&quot;}]},&quot;acidez&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;min&quot;:1,&quot;max&quot;:3},&quot;tostion&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;min&quot;:1,&quot;max&quot;:3},&quot;dulzor&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;min&quot;:1,&quot;max&quot;:3},&quot;acidezLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Media&quot;},&quot;tostionLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Media&quot;},&quot;dulzorLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Medio&quot;},&quot;compact&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const title = p.title ?? 'Suave Lavado Colombiano';
    const badge = p.badge ?? 'Lavado';
    const badgeColor = p.badgeColor ?? '#426E50';
    const processDesc = p.processDesc ?? 'Proceso lavado completo';
    const notes = p.notes ?? ['Panela', 'Chocolate', 'Miel'];
    const prices = p.prices ?? [
      { size: '250 gr', price: '$30.300' },
      { size: '500 gr', price: '$41.500' },
      { size: '2.5 kg', price: '$152.000' },
    ];
    const compact = !!p.compact;
    const mk = (n) => [1, 2, 3].map((i) => ({ on: i <= n, off: i > n }));
    const attrs = [
      { name: 'Acidez', label: p.acidezLabel ?? 'Media', dots: mk(p.acidez ?? 2) },
      { name: 'Tostión', label: p.tostionLabel ?? 'Media', dots: mk(p.tostion ?? 2) },
      { name: 'Dulzor', label: p.dulzorLabel ?? 'Medio', dots: mk(p.dulzor ?? 2) },
    ];
    const msg = encodeURIComponent('Hola, quiero información sobre ' + title);
    const whatsappUrl = 'https://wa.me/573137119699?text=' + msg;
    const first = prices[0] || { size: '', price: '' };
    return {
      title, badge, badgeColor, processDesc, notes, prices, attrs, whatsappUrl,
      isFull: !compact, isCompact: compact,
      fromSize: first.size, fromPrice: first.price,
    };
  }
}
</script>
</body>
</html>
